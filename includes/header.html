<!--

  Before publishing: set aria-current="page" on exactly one nav link (desktop + mobile) that matches
  the current URL, and remove aria-current from all other links.

  Paths are root-relative (/css/, /assets/, etc.).
-->
<header class="site-header" role="banner">
  <a class="skip-link" href="#main">Skip to main content</a>

      <img class="logo-scrolled" src="/assets/images/logo-yellow.svg" width="200" height="28" alt="" />
    </a>
            <nav class="site-nav" aria-label="Primary">
          <div class="site-nav__group site-nav__group--paths" role="group" aria-label="Choose your path">

          </div>
          <span class="site-nav__sep" aria-hidden="true"></span>
          <div class="site-nav__group site-nav__group--learn" role="group" aria-label="Methodology and company">
          <a href="/why-priorify/">Why Priorify</a>
          <a href="/our-process/">Our Process</a>
          <a href="/pricing/">Pricing</a>
          <a href="/research/">Research</a>

        </nav>
    <button
      type="button"
      class="site-header__toggle"
      aria-expanded="false"
      aria-controls="site-nav-mobile"
      aria-label="Open menu"
    >
      <span class="site-header__toggle-bar"></span>
      <span class="site-header__toggle-bar"></span>
      <span class="site-header__toggle-bar"></span>
    </button>
  </div>
        <div id="site-nav-mobile" class="site-nav-mobile" hidden>
